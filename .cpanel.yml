# Bluehost / cPanel Git deployment configuration
# Runs automatically after each git pull on the server.
# Docs: https://docs.cpanel.net/cpanel/files/git-version-control/

---
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/public_html/tostigames/ttfinder
    - cd $DEPLOYPATH
    - npm install --omit=dev
    - npm run build

# Bluehost / cPanel Git deployment configuration
# Runs automatically after each git pull on the server.
# PHP files are served directly by Apache — no build step needed.

---
deployment:
  tasks:
    - export DEPLOYPATH=/home2/dvqeyxmy/public_html/tostigames/ttfinder
    - cd $DEPLOYPATH
    - php -r "echo 'TTFinder deployed at ' . date('Y-m-d H:i:s') . PHP_EOL;"
